<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getDatabase, ref, child, runTransaction, push, onDisconnect } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

  // إعدادات مشروعك الخاص AliGen Connect
  const firebaseConfig = {
    apiKey: "AIzaSyDkKr5rlzcUa0KGPZ6vgCZmWzBbXOTfLcc",
    authDomain: "aligen-connect.firebaseapp.com",
    databaseURL: "https://aligen-connect-default-rtdb.firebaseio.com",
    projectId: "aligen-connect",
    storageBucket: "aligen-connect.firebasestorage.app",
    messagingSenderId: "200519601485",
    appId: "1:200519601485:web:d4dec85490471a4986bb04",
    measurementId: "G-2KCBYDP6QX"
  };

  // تهيئة Firebase والـ Realtime Database
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // التعرف على اسم الموقع الحالي تلقائياً وتطهيره من النقاط ليتناسب مع الفايرباس
  const siteDomain = window.location.hostname || "Localhost_Test";
  const siteId = siteDomain.replace(/\./g, '_'); 

  // تجهيز مصفوفات التوقيع الزمني (اليوم، الأسبوع، الشهر، السنة)
  const now = new Date();
  const year = now.getFullYear();
  const month = year + "-" + String(now.getMonth() + 1).padStart(2, '0');
  const day = month + "-" + String(now.getDate()).padStart(2, '0');

  // حساب رقم الأسبوع الحالي في السنة
  const startOfYear = new Date(year, 0, 1);
  const pastDaysOfYear = (now - startOfYear) / 86400000;
  const week = year + "-W" + Math.ceil((pastDaysOfYear + startOfYear.getDay() + 1) / 7);

  // تحديد مسار الموقع داخل قاعدة البيانات
  const siteRootRef = ref(db, 'analytics/' + siteId);

  // دالة ذكية لزيادة العدادات بأمان تمنع تداخل البيانات (Transactions)
  const incrementCounter = (targetRef) => {
    runTransaction(targetRef, (currentValue) => {
      return (currentValue || 0) + 1;
    });
  };

  // زيادة عدادات الزيارات بمختلف التصنيفات الزمنية
  incrementCounter(child(siteRootRef, 'total'));
  incrementCounter(child(siteRootRef, 'daily/' + day));
  incrementCounter(child(siteRootRef, 'weekly/' + week));
  incrementCounter(child(siteRootRef, 'monthly/' + month));
  incrementCounter(child(siteRootRef, 'yearly/' + year));

  // مراقبة وحساب الزوار الحاليين في نفس اللحظة (Online)
  const onlineListRef = child(siteRootRef, 'online');
  const newOnlineUserRef = push(onlineListRef);

  // تسجيل دخول الزائر وحذفه تلقائياً فور خروجه أو إغلاق الصفحة
  newOnlineUserRef.set(true);
  onDisconnect(newOnlineUserRef).remove();
</script>
